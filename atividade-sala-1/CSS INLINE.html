<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Aula CSS - 1</title>
</head>

<body>
	<!-- CSS INLINE -> faz as modificaçoes na linha (só altera a região que está, não modificando o resto do código)-->
	<div style="width:500px; height: fit-content; background-color: aliceblue; border-radius: 25px; border: solid 2px rgb(137, 124, 203); margin: 20px; padding: 40px">
		<!-- trocar a borda para BORDER: SOLID 2PX-->
		<!-- div cria o container-->
		<!--PADDING espaçamento dentro do container (espaçamento interno)-->
		<div style="width: 100px; height: 100px; border-radius: 50%; margin-bottom: 50px">
			<!--MARGIN -> margem do texto ou imagem (no caso da imagem)-->
			<img style="width: 100%;  height: 100%; margin-top: 20px;" src="https://cdn-icons-png.flaticon.com/512/706/706830.png" alt="">
		</div>

		<div>
			<h1 style="font-family: monospace; font-size: 30px;">
				Meu nome é: <span style="color: blue"> Adriana </span>
			</h1>

			<p style="font-family: monospace; font-size: 15px;">
				Mensagem: <span style="color: blue"> A vida não é um morango! </span>
			</p>
		</div>
	</div>

	<div style="width:500px; height: fit-content; background-color: aliceblue; border-radius: 25px; border: solid 8px green; margin: 20px">

		<div style="width: 100px; height: 100px; border-radius: 25px;">
			<img style="width: 100%;  height: 100%; margin-top: 20px;" src="https://cdn-icons-png.flaticon.com/256/3681/3681928.png" alt="">
		</div>

		<div>
			<h1 style="font-family: monospace; font-size: 30px;">
				Meu nome é: Hugo
			</h1>

			<p style="font-family: monospace; font-size: 15px;">
				Mensagem: Um dia é da caça, o outro é do caçador.
			</p>
		</div>
	</div>

</body>

</html>
